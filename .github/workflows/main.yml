name: PlatformIO Build

on:
  push:
  pull_request:

jobs:
  check-python:
    name: Check Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: find raspi/ -name "*.py" -exec python3 -m py_compile {} +

  build-esp:
    name: Build ESP
    runs-on: ubuntu-latest
    needs: check-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('ESP/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ESP code
        run: cd ESP && python3 -m platformio run

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp-firmware
          path: |
            ESP/.pio/build/esp32dev/firmware.bin
            ESP/.pio/build/esp32dev/firmware.elf
