name: PlatformIO Build

on:
  push:
  pull_request:

jobs:
  build-pico:
    name: Build Pico
    runs-on: ubuntu-latest
    needs: check-python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          sudo apt-get update && sudo apt-get install -y git
          python -m venv venv
          source venv/bin/activate
          pip install platformio

      - name: Build Pico code
        run: |
          echo "Building Pico code with PlatformIO..."
          source venv/bin/activate
          cd Pico_Drive
          pio run

      - name: Upload Pico build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pico-build
          path: pico/.pio/build/

  build-Arduino:
    name: Build Arduino
    runs-on: ubuntu-latest
    needs: check-python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          sudo apt-get update && sudo apt-get install -y git
          python -m venv venv
          source venv/bin/activate
          pip install platformio

      - name: Build Arduino code
        run: |
          echo "Building Pico code with PlatformIO..."
          source venv/bin/activate
          cd Arduino_Uno
          pio run

      - name: Upload Pico build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pico-build
          path: pico/.pio/build/
